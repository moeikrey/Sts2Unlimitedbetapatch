name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version bump from conventional commits
        id: version
        run: |
          # Get the last release tag
          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, defaulting to minor bump"
            BUMP_TYPE="minor"
          else
            echo "Last tag: $LAST_TAG"
            # Collect commit messages since last tag
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")
            echo "Commits since $LAST_TAG:"
            echo "$COMMITS"

            BUMP_TYPE="patch"
            while IFS= read -r msg; do
              # Breaking change: feat!:, fix!:, or BREAKING CHANGE in body
              if echo "$msg" | grep -qE '^[a-z]+(\([^)]+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
                BUMP_TYPE="major"
                break
              fi
              # New feature: bump to at least minor
              if echo "$msg" | grep -qE '^feat(\([^)]+\))?:'; then
                BUMP_TYPE="minor"
              fi
            done <<< "$COMMITS"
          fi

          echo "Bump type: $BUMP_TYPE"

          VERSION=$(jq -r '.version' Sts2Unlimited.json | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$BUMP_TYPE" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac

          jq --arg v "v$NEW_VERSION" '.version = $v' Sts2Unlimited.json > tmp.json && mv tmp.json Sts2Unlimited.json
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "Bumped version: $VERSION → $NEW_VERSION ($BUMP_TYPE)"

      - name: Cache Godot editor
        id: godot-cache
        uses: actions/cache@v5.0.4
        with:
          path: .godot-bin
          key: godot-4.5.1-linux-editor

      - name: Download Godot editor
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_linux.x86_64.zip"
          unzip -q Godot_v4.5.1-stable_linux.x86_64.zip
          mkdir -p .godot-bin
          mv Godot_v4.5.1-stable_linux.x86_64 .godot-bin/godot
          chmod +x .godot-bin/godot

      - name: Regenerate PCK with bumped version
        run: .godot-bin/godot --headless --export-pack "Windows Desktop" sts2unlimited.pck

      - name: Download sts2.dll from release assets
        env:
          GH_TOKEN: ${{ secrets.STS2_DLL_PAT }}
        run: |
          gh release download deps --pattern "sts2.dll" --repo "${{ github.repository }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Create default config files
        run: echo "8" > sts2unlimited.maxplayers.txt

      - name: Build and bundle
        run: dotnet build --configuration ExportRelease
        # The BundleRelease MSBuild target copies all mod files to release/

      - name: Zip release directory
        run: |
          cd release
          zip -r ../Sts2Unlimited.zip .
          echo "Archive contents:"
          zipinfo ../Sts2Unlimited.zip

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sts2Unlimited.json sts2unlimited.pck
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: Sts2Unlimited.zip
          generate_release_notes: true

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.3
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: 7166860
          filename: Sts2Unlimited.zip
          version: ${{ steps.version.outputs.version }}
          file_category: main
