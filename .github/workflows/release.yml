name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump minor version
        id: version
        run: |
          VERSION=$(jq -r '.version' Sts2Unlimited.json | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
          jq --arg v "v$NEW_VERSION" '.version = $v' Sts2Unlimited.json > tmp.json && mv tmp.json Sts2Unlimited.json
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped version: $VERSION → $NEW_VERSION"

      - name: Cache Godot editor
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: .godot-bin
          key: godot-4.5.1-linux-editor

      - name: Download Godot editor
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_linux.x86_64.zip"
          unzip -q Godot_v4.5.1-stable_linux.x86_64.zip
          mkdir -p .godot-bin
          mv Godot_v4.5.1-stable_linux.x86_64 .godot-bin/godot
          chmod +x .godot-bin/godot

      - name: Regenerate PCK with bumped version
        run: .godot-bin/godot --headless --export-pack "Windows Desktop" sts2unlimited.pck

      - name: Download sts2.dll from release assets
        env:
          GH_TOKEN: ${{ secrets.STS2_DLL_PAT }}
        run: |
          gh release download deps --pattern "sts2.dll" --repo "${{ github.repository }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Create default config files
        run: echo "8" > sts2unlimited.maxplayers.txt

      - name: Build and bundle
        run: dotnet build --configuration ExportRelease
        # The BundleRelease MSBuild target copies all mod files to release/

      - name: Zip release directory
        run: |
          cd release
          zip -r ../Sts2Unlimited.zip .
          echo "Archive contents:"
          zipinfo ../Sts2Unlimited.zip

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Sts2Unlimited.json sts2unlimited.pck
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: Sts2Unlimited.zip
          generate_release_notes: true
          
